<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="pageTitle">Business</title>

  <link rel="stylesheet" href="index.css">

</head>

<body>

<header class="header">

  <div class="container nav">

    <div class="logo" id="business-name"></div>

    <nav class="links">
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#gallery">Gallery</a>
      <a href="#contact">Contact</a>
    </nav>

    <button class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>


  <nav class="mobile-menu" id="mobileMenu">

    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>

  </nav>

</header>


<section class="hero">

  <img
    id="heroImage"
    class="hero-img"
    alt="Business hero image"
  >

  <div class="overlay"></div>

  <div class="container hero-content">

    <h1 id="heroTitle"></h1>

    <p id="heroText"></p>

    <div class="hero-buttons">

      <a class="btn primary" id="heroWhatsappBtn">
        WhatsApp Us
      </a>

      <a class="btn outline" id="heroCallBtn">
        Call Now
      </a>

    </div>

  </div>

</section>


<section id="about" class="section">

  <div class="container about-content">

    <h2 id="aboutTitle"></h2>

    <p id="aboutText"></p>

  </div>

</section>


<section id="services" class="section dark">

  <div class="container">

    <h2>Our Services</h2>

    <p id="servicesText"></p>

    <div class="grid" id="servicesContainer"></div>

  </div>

</section>


<section id="gallery" class="section">

  <div class="container">

    <h2>Gallery</h2>

    <div class="gallery collapsed" id="galleryContainer"></div>

    <button class="gallery-btn">
      View All Photos
    </button>

  </div>

</section>


<section id="contact" class="section dark">

  <div class="container">

    <h2>Contact Us</h2>

    <p id="contactText"></p>

    <div class="contact-buttons">

      <a class="btn primary" id="whatsappBtn">
        WhatsApp Us
      </a>

      <a class="btn outline" id="callBtn">
        Call Now
      </a>

    </div>

  </div>

</section>


<footer class="footer">

  <div class="container">

    © <span id="footerName"></span>. All Rights Reserved.

  </div>

</footer>


<a
  class="floating-whatsapp"
  id="floatingWhatsapp"
>
  💬
</a>


<script src="content.js"></script>
<script src="index.js"></script>

</body>

</html>
